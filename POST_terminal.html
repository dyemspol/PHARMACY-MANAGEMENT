<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS Terminal | DavaoDeOro</title>
    <link href="/src/style.css" rel="stylesheet" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
      [x-cloak] { display: none !important; }
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body class="antialiased text-slate-900 overflow-x-hidden bg-[#F8FAFC]" x-data="{ 
    sidebarOpen: true,
    cart: [],
    searchQuery: '',
    selectedCategory: 'All',
    medicines: [
      { id: 1, name: 'Paracetamol', category: 'Pain Relief', price: 2000, stock: 37, color: 'bg-teal-50 text-teal-600' },
      { id: 2, name: 'Doliprane', category: 'Pain Relief', price: 200, stock: 25, color: 'bg-amber-50 text-amber-600' },
      { id: 3, name: 'Aspirine', category: 'Pain Relief', price: 150, stock: 25, color: 'bg-rose-50 text-rose-600' },
      { id: 4, name: 'Tramadol', category: 'Pain Relief', price: 2000, stock: 30, color: 'bg-blue-50 text-blue-600' },
      { id: 5, name: 'Amoxicillin', category: 'Antibiotics', price: 450, stock: 15, color: 'bg-purple-50 text-purple-600' },
      { id: 6, name: 'Cetirizine', category: 'Allergy', price: 80, stock: 100, color: 'bg-indigo-50 text-indigo-600' }
    ],
    addToCart(medicine) {
      const existing = this.cart.find(item => item.id === medicine.id);
      if (existing) {
        existing.quantity++;
      } else {
        this.cart.push({ ...medicine, quantity: 1 });
      }
    },
    removeFromCart(id) {
      this.cart = this.cart.filter(item => item.id !== id);
    },
    getTotal() {
      return this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    }
  }">
    
    <div class="bg-mesh"></div>

    <!-- Sidebar -->
    <aside 
      class="fixed inset-y-0 left-0 z-50 w-72 transition-all duration-500 lg:translate-x-0"
      :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
    >
      <div class="h-full m-4 bg-white/80 backdrop-blur-2xl border border-white/40 rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden">
        <div class="p-8">
          <a href="index.html" class="flex items-center gap-4 group cursor-pointer transition-transform hover:scale-105">
            <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-xl shadow-teal-500/10 border border-teal-50 overflow-hidden transition-transform group-hover:scale-110">
              <img src="/src/img/logo.png" alt="Logo" class="w-full h-full object-cover">
            </div>
            <div>
              <h1 class="text-xl font-extrabold tracking-tight text-slate-800 leading-none">DavaoDeOro</h1>
              <span class="text-[10px] font-bold uppercase tracking-widest text-teal-600 mt-1 block">Pharmacy</span>
            </div>
          </a>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 px-4 py-2 space-y-2 overflow-y-auto">
          <p class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-4">Main Menu</p>
          
          <a href="index.html" class="nav-link w-full">
            <i data-lucide="layout-grid" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Dashboard</span>
          </a>

          <a href="inventory.html" class="nav-link w-full">
            <i data-lucide="package" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Inventory</span>
          </a>

          <a href="POST_terminal.html" class="nav-link w-full active">
            <i data-lucide="shopping-bag" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">POS Terminal</span>
          </a>

          <a href="sales.html" class="nav-link w-full">
            <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Sales History</span>
          </a>

          <a href="#" class="nav-link w-full">
            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Restocking</span>
          </a>

          <a href="#" class="nav-link w-full">
            <i data-lucide="file-text" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Reports</span>
          </a>

          <a href="#" class="nav-link w-full">
            <i data-lucide="truck" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Logistics</span>
          </a>

        </nav>

        <!-- Logout -->
        <div class="p-6 mt-auto">
          <button class="w-full flex items-center gap-3 px-5 py-4 text-rose-500 hover:bg-rose-50 rounded-4xl transition-all duration-300 font-bold text-sm group">
            <i data-lucide="log-out" class="w-5 h-5 transition-transform group-hover:-translate-x-1"></i>
            <span>Logout Account</span>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="lg:ml-72 min-h-screen transition-all duration-500 flex flex-col md:flex-row gap-0">
      
      <!-- Center: Product Selection (Left when on main grid) -->
      <div class="flex-1 p-6 md:p-8 space-y-8 overflow-y-auto max-h-screen hide-scrollbar">
        <!-- Header -->
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-4">
            <button @click="sidebarOpen = !sidebarOpen" class="w-12 h-12 flex items-center justify-center bg-white rounded-2xl shadow-sm border border-slate-100 lg:hidden">
              <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
            <div>
              <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">Point of Sale</h2>
              <p class="text-sm text-slate-400 font-medium">Quick checkout and bill generation</p>
            </div>
          </div>
          <div class="hidden sm:flex items-center gap-2 bg-white px-4 py-2 rounded-2xl border border-slate-100 shadow-sm">
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
            <span class="text-xs font-bold text-slate-600">Session: Active</span>
          </div>
        </div>

        <!-- Filters & Search -->
        <div class="space-y-6 animate-bento">
          <div class="relative group">
            <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5 group-focus-within:text-teal-600 transition-colors"></i>
            <input 
              type="text" 
              x-model="searchQuery"
              placeholder="Search by name, category or barcode..." 
              class="w-full pl-14 pr-6 py-5 bg-white border border-slate-100 rounded-4xl focus:outline-none focus:ring-4 focus:ring-teal-500/5 focus:border-teal-500 transition-all text-sm shadow-sm font-medium"
            >
          </div>

          <div class="flex gap-3 overflow-x-auto pb-2 hide-scrollbar">
            <template x-for="cat in ['All', 'Pain Relief', 'Antibiotics', 'Allergy', 'Vitamins', 'First Aid']">
              <button 
                @click="selectedCategory = cat"
                :class="selectedCategory === cat ? 'bg-teal-600 text-white shadow-lg shadow-teal-500/20' : 'bg-white text-slate-600 hover:bg-slate-50 border border-slate-100'"
                class="px-6 py-3 rounded-2xl text-xs font-bold transition-all whitespace-nowrap"
                x-text="cat"
              ></button>
            </template>
          </div>
        </div>

        <!-- Products Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 animate-bento delay-1">
          <template x-for="med in medicines.filter(m => (selectedCategory === 'All' || m.category === selectedCategory) && m.name.toLowerCase().includes(searchQuery.toLowerCase()))" :key="med.id">
            <div 
              @click="addToCart(med)"
              class="glass-card p-5 rounded-[2.5rem] cursor-pointer group hover:border-teal-500/30"
            >
              <div class="flex items-start justify-between mb-4">
                <div :class="`w-14 h-14 ${med.color} rounded-2xl flex items-center justify-center font-bold text-xl shadow-sm border border-black/5 group-hover:scale-110 transition-transform`" x-text="med.name.charAt(0)"></div>
                <div class="bg-slate-50 px-3 py-1.5 rounded-full border border-slate-100">
                  <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tight" x-text="med.category"></span>
                </div>
              </div>
              <div class="space-y-1">
                <h3 class="text-[15px] font-bold text-slate-800" x-text="med.name"></h3>
                <div class="flex items-center justify-between">
                  <span class="text-lg font-black text-slate-900 tracking-tight">GHC <span x-text="med.price.toFixed(2)"></span></span>
                  <span class="text-[10px] font-bold text-teal-600 uppercase" x-text="med.stock + ' in stock'"></span>
                </div>
              </div>
              <div class="mt-4 pt-4 border-t border-slate-50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
                 <span class="text-[10px] font-bold text-teal-600 uppercase flex items-center gap-2">
                   <i data-lucide="plus" class="w-3 h-3"></i> Quick Add
                 </span>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Right: Cart / Checkout Sidebar -->
      <div class="w-full md:w-[400px] bg-white/50 backdrop-blur-3xl border-l border-white/20 flex flex-col h-screen">
        <div class="p-8 border-b border-slate-100">
          <div class="flex items-center justify-between">
            <h3 class="text-xl font-bold text-slate-800">Current Sale</h3>
            <button @click="cart = []" class="text-[10px] font-bold text-slate-400 hover:text-rose-500 uppercase tracking-widest transition-colors">Clear All</button>
          </div>
        </div>

        <!-- Cart Items -->
        <div class="flex-1 overflow-y-auto p-8 space-y-6 hide-scrollbar">
          <template x-if="cart.length === 0">
            <div class="h-full flex flex-col items-center justify-center text-center space-y-4 opacity-40">
              <div class="w-20 h-20 bg-slate-100 rounded-4xl flex items-center justify-center text-slate-400">
                <i data-lucide="shopping-basket" class="w-10 h-10"></i>
              </div>
              <p class="text-sm font-bold text-slate-500">Your cart is empty<br><span class="text-[10px] uppercase font-medium">Select items to start a sale</span></p>
            </div>
          </template>

          <template x-for="item in cart" :key="item.id">
            <div class="flex items-center gap-4 animate-bento">
              <div :class="`w-12 h-12 ${item.color} rounded-2xl flex items-center justify-center font-bold text-sm shadow-sm`" x-text="item.name.charAt(0)"></div>
              <div class="flex-1">
                <h4 class="text-sm font-bold text-slate-800" x-text="item.name"></h4>
                <p class="text-xs font-medium text-slate-400">GHC <span x-text="item.price.toFixed(2)"></span> × <span x-text="item.quantity"></span></p>
              </div>
              <div class="flex items-center gap-3">
                <button @click="if(item.quantity > 1) item.quantity--; else removeFromCart(item.id)" class="w-8 h-8 flex items-center justify-center bg-slate-50 text-slate-400 rounded-lg hover:bg-rose-50 hover:text-rose-500 transition-colors">
                  <i data-lucide="minus" class="w-4 h-4"></i>
                </button>
                <span class="text-sm font-bold text-slate-700 w-4 text-center" x-text="item.quantity"></span>
                <button @click="item.quantity++" class="w-8 h-8 flex items-center justify-center bg-slate-50 text-slate-400 rounded-lg hover:bg-teal-50 hover:text-teal-600 transition-colors">
                  <i data-lucide="plus" class="w-4 h-4"></i>
                </button>
              </div>
            </div>
          </template>
        </div>

        <!-- Summary & Checkout -->
        <div class="p-8 bg-white border-t border-slate-100 space-y-6">
          <div class="space-y-2">
            <div class="flex items-center justify-between">
              <span class="text-sm font-medium text-slate-400">Subtotal</span>
              <span class="text-sm font-bold text-slate-700 font-mono">GHC <span x-text="getTotal().toFixed(2)"></span></span>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm font-medium text-slate-400">Tax (0%)</span>
              <span class="text-sm font-bold text-slate-700 font-mono">GHC 0.00</span>
            </div>
            <div class="pt-4 border-t border-slate-50 flex items-center justify-between">
              <span class="text-lg font-extrabold text-slate-800">Total</span>
              <span class="text-2xl font-black text-teal-600 tracking-tight font-mono">GHC <span x-text="getTotal().toFixed(2)"></span></span>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            
            <button class="flex flex-col items-center justify-center p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:bg-slate-100 transition-all gap-2 group">
              <i data-lucide="printer" class="w-5 h-5 text-slate-400 group-hover:text-slate-600"></i>
              <span class="text-[10px] font-bold text-slate-600 uppercase">Receipt</span>
            </button>
          </div>

          <button class="w-full py-5 bg-teal-600 text-white font-bold rounded-4xl shadow-lg shadow-teal-500/20 hover:bg-teal-700 active:scale-[0.98] transition-all flex items-center justify-center gap-3 group">
            <span class="text-lg uppercase tracking-wider">Pay Now</span>
            <i data-lucide="arrow-right" class="w-5 h-5 transition-transform group-hover:translate-x-1"></i>
          </button>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
    <script>
      lucide.createIcons();
      // Need to re-run icons on Alpine updates if using lucide in loops
      // Simple observer for demonstration
      document.addEventListener('alpine:initialized', () => {
        lucide.createIcons();
      });
    </script>
  </body>
</html>
