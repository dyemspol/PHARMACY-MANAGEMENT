<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>POS Terminal | DavaoDeOro</title>
    <link href="/src/style.css" rel="stylesheet" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
      [x-cloak] { display: none !important; }
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* Mobile optimization */
      @media (max-width: 1024px) {
        .cart-sidebar {
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          height: 85vh;
          z-index: 50;
          transform: translateY(100%);
          transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cart-sidebar.open {
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="antialiased text-slate-900 bg-[#F8FAFC]" x-data="{ 
    sidebarOpen: false,
    cartOpen: false,
    showSuccess: false,
    lastTransactionId: '',
    paymentModalOpen: false,
    cashAmount: '',
    changeAmount: 0,
    cart: [],
    searchQuery: '',
    selectedCategory: 'All',
    medicines: [],
    
    async init() {
      const waitForDb = setInterval(async () => {
        if (window.db) {
          clearInterval(waitForDb);
          this.medicines = await window.db.fetchInventory();
          lucide.createIcons();
        }
      }, 100);
    },

    addToCart(medicine) {
      const stockNum = parseInt(String(medicine.stock).replace(' units', '')) || 0;
      const existing = this.cart.find(item => item.id === medicine.id);
      if (existing) {
        if (existing.quantity < stockNum) {
          existing.quantity++;
        }
      } else if (stockNum > 0) {
        this.cart.push({ ...medicine, quantity: 1 });
      }
    },

    removeFromCart(id) {
      this.cart = this.cart.filter(item => item.id !== id);
    },

    getTotal() {
      return this.cart.reduce((sum, item) => {
        let priceValue = item.sellingPrice;
        if(typeof priceValue === 'string') {
          priceValue = parseFloat(priceValue.replace('₱', '')) || 0;
        }
        return sum + (priceValue * item.quantity);
      }, 0);
    },

    openPaymentModal() {
      if (this.cart.length === 0) return;
      this.cashAmount = '';
      this.changeAmount = 0;
      this.paymentModalOpen = true;
    },

    calculateChange() {
      const total = this.getTotal();
      const cash = parseFloat(this.cashAmount) || 0;
      this.changeAmount = Math.max(0, cash - total);
      return this.changeAmount;
    },

    isValidPayment() {
      const total = this.getTotal();
      const cash = parseFloat(this.cashAmount) || 0;
      return cash >= total && total > 0;
    },

    async confirmPayment() {
      if (!this.isValidPayment()) return;
      
      for (const item of this.cart) {
        const med = this.medicines.find(m => m.id === item.id);
        if (med) {
          let currentStockNum = parseInt(String(med.stock).replace(' units', ''));
          let newStockNum = Math.max(0, currentStockNum - item.quantity);
          let newStockStr = newStockNum + ' units';
          med.stock = newStockStr;
          await window.db.updateInventoryItem(med.id, { stock: newStockStr });
        }
      }
      
      this.lastTransactionId = 'TRX-' + Math.random().toString(36).substr(2, 9).toUpperCase();
      this.lastTransactionTotal = this.getTotal();
      
      const saleDataToSave = {
          date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
          time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
          items: String(this.cart.length),
          units: String(this.cart.reduce((acc, curr) => acc + curr.quantity, 0)),
          total: '₱' + this.getTotal().toFixed(2),
          transactionId: this.lastTransactionId,
          createdAt: new Date()
      };
      
      await window.salesDb.saveSaleData(saleDataToSave);
      
      this.paymentModalOpen = false;
      this.showSuccess = true;
      this.cart = [];
      this.cartOpen = false;
      setTimeout(() => this.showSuccess = false, 3000);
    }
  }">
    
    <!-- Mobile Sidebar Backdrop -->
    <div x-show="sidebarOpen" @click="sidebarOpen = false" x-cloak class="fixed inset-0 z-40 bg-slate-900/60 backdrop-blur-sm lg:hidden transition-opacity"></div>

    <!-- Main Sidebar (Desktop/Mobile) -->
    <aside class="fixed inset-y-0 left-0 z-50 w-72 lg:w-20 xl:w-72 bg-white border-r border-slate-200 transition-transform duration-300 lg:translate-x-0" :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'">
      <div class="h-full flex flex-col">
        <div class="p-6 lg:p-4 xl:p-6 mb-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-teal-600 rounded-xl flex items-center justify-center">
               <i data-lucide="cross" class="w-5 h-5 text-white"></i>
            </div>
            <span class="text-lg font-bold lg:hidden xl:block">Pharmacy</span>
          </div>
          <button @click="sidebarOpen = false" class="lg:hidden p-2 hover:bg-slate-100 rounded-lg">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>

        <nav class="flex-1 px-4 space-y-1">
          <a href="index.html" class="flex items-center gap-3 p-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-all">
            <i data-lucide="layout-grid" class="w-5 h-5"></i>
            <span class="font-medium lg:hidden xl:block">Dashboard</span>
          </a>
          <a href="inventory.html" class="flex items-center gap-3 p-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-all">
            <i data-lucide="package" class="w-5 h-5"></i>
            <span class="font-medium lg:hidden xl:block">Inventory</span>
          </a>
          <a href="POST_terminal.html" class="flex items-center gap-3 p-3 bg-teal-50 text-teal-600 rounded-xl transition-all">
            <i data-lucide="shopping-cart" class="w-5 h-5"></i>
            <span class="font-semibold lg:hidden xl:block">POS Terminal</span>
          </a>
          <!-- More links... -->
        </nav>

        <div class="p-4 border-t border-slate-100">
           <button class="w-full flex items-center gap-3 p-3 text-rose-600 hover:bg-rose-50 rounded-xl transition-all group">
             <i data-lucide="log-out" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
             <span class="font-medium lg:hidden xl:block">Logout</span>
           </button>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="lg:ml-20 xl:ml-72 min-h-screen flex flex-col">
      
      <!-- Top Bar -->
      <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 py-3 sm:px-6 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <button @click="sidebarOpen = true" class="lg:hidden p-2 hover:bg-slate-100 rounded-lg">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
          <div>
            <h1 class="text-xl font-bold text-slate-900 tracking-tight">Point of Sale</h1>
            <p class="text-xs text-slate-500 font-medium hidden sm:block">DavaoDeOro Pharmacy Management</p>
          </div>
        </div>

        <div class="flex items-center gap-3">
          <div class="hidden md:flex items-center gap-2 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-100">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
            <span class="text-[10px] font-bold text-emerald-700 uppercase tracking-wider">System Live</span>
          </div>
          <!-- Cart Toggle for Mobile -->
          <button @click="cartOpen = true" class="lg:hidden relative p-3 bg-teal-600 text-white rounded-2xl shadow-lg shadow-teal-600/20">
            <i data-lucide="shopping-cart" class="w-5 h-5"></i>
            <template x-if="cart.length > 0">
              <span class="absolute -top-1 -right-1 w-5 h-5 bg-rose-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center border-2 border-white" x-text="cart.length"></span>
            </template>
          </button>
        </div>
      </header>

      <div class="flex-1 flex flex-col lg:flex-row h-[calc(100vh-64px)] overflow-hidden">
        
        <!-- Center Area: Products -->
        <div class="flex-1 flex flex-col p-4 sm:p-6 overflow-hidden bg-slate-50/50">
          
          <!-- Search & Categories -->
          <div class="mb-6 space-y-4">
            <div class="relative max-w-2xl">
              <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
              <input type="text" x-model="searchQuery" placeholder="Search medicines, category..." class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-[1.25rem] focus:outline-none focus:ring-4 focus:ring-teal-500/5 focus:border-teal-500 transition-all text-sm shadow-sm">
            </div>
            
            <div class="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">
              <template x-for="cat in ['All', 'Pain Relief', 'Antibiotics', 'Vitamins', 'Medical Supplies']">
                <button 
                  @click="selectedCategory = cat"
                  :class="selectedCategory === cat ? 'bg-teal-600 text-white shadow-lg shadow-teal-600/20' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'"
                  class="px-5 py-2 rounded-xl text-xs font-bold transition-all whitespace-nowrap"
                  x-text="cat"
                ></button>
              </template>
            </div>
          </div>

          <!-- Products Grid -->
          <div class="flex-1 overflow-y-auto pr-2 -mr-2 space-y-6 hide-scrollbar">
            <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-3 sm:gap-4 pb-8">
              <template x-for="med in medicines.filter(m => (selectedCategory === 'All' || m.category === selectedCategory) && (m.name.toLowerCase().includes(searchQuery.toLowerCase()) || m.category.toLowerCase().includes(searchQuery.toLowerCase())))" :key="med.id">
                <div @click="addToCart(med)" class="bg-white p-3 sm:p-4 rounded-3xl border border-slate-200 shadow-sm hover:border-teal-500 hover:shadow-md transition-all cursor-pointer group flex flex-col">
                  <!-- Category & Stock badges - REDESIGNED to avoid overlap -->
                  <div class="flex items-center justify-between mb-4">
                    <span class="text-[9px] font-black uppercase px-2 py-0.5 rounded-md bg-slate-100 text-slate-500" x-text="med.category"></span>
                    <span :class="parseInt(String(med.stock).replace(' units','')) < 10 ? 'text-rose-500 bg-rose-50' : 'text-emerald-600 bg-emerald-50'" class="text-[9px] font-black uppercase px-2 py-0.5 rounded-md" x-text="med.stock"></span>
                  </div>
                  
                  <div class="flex-1 space-y-1 mb-4">
                    <h3 class="text-sm font-bold text-slate-800 line-clamp-2 leading-tight" x-text="med.name"></h3>
                    <div class="flex items-center gap-1">
                       <template x-if="med.type"><span class="text-[8px] font-bold text-slate-400" x-text="med.type"></span></template>
                       <template x-if="med.kind"><span class="text-[8px] font-bold text-teal-600" x-text="'• ' + med.kind"></span></template>
                    </div>
                  </div>

                  <div class="flex items-end justify-between mt-auto pt-3 border-t border-slate-50">
                    <span class="text-base font-black text-slate-900" x-text="med.sellingPrice"></span>
                    <div class="w-8 h-8 bg-slate-50 group-hover:bg-teal-600 group-hover:text-white rounded-xl flex items-center justify-center transition-colors">
                      <i data-lucide="plus" class="w-4 h-4"></i>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- Right Side: Cart Section -->
        <div class="cart-sidebar w-full lg:w-[400px] bg-white border-l border-slate-200 flex flex-col shadow-2xl lg:shadow-none" :class="cartOpen ? 'open' : ''">
          
          <!-- Cart Header -->
          <div class="p-6 border-b border-slate-100 flex items-center justify-between">
            <div class="flex items-center gap-3">
              <h2 class="text-xl font-bold text-slate-800">Current Order</h2>
              <span class="bg-teal-50 text-teal-600 text-[10px] font-black px-2 py-0.5 rounded-full" x-text="cart.length"></span>
            </div>
            <button @click="cartOpen = false" class="lg:hidden p-2 hover:bg-slate-100 rounded-lg">
              <i data-lucide="chevron-down" class="w-5 h-5"></i>
            </button>
            <button @click="cart = []" class="hidden lg:block text-[10px] font-bold text-slate-400 hover:text-rose-500 uppercase tracking-widest transition-colors">Clear All</button>
          </div>

          <!-- Items Area -->
          <div class="flex-1 overflow-y-auto p-6 space-y-4 hide-scrollbar">
            <template x-if="cart.length === 0">
              <div class="h-full flex flex-col items-center justify-center text-center opacity-40">
                <i data-lucide="shopping-bag" class="w-16 h-16 text-slate-200 mb-4"></i>
                <p class="font-bold text-slate-400">Your cart is empty</p>
                <p class="text-xs">Add items to proceed</p>
              </div>
            </template>

            <template x-for="item in cart" :key="item.id">
              <div class="flex items-center gap-4 bg-slate-50/50 p-4 rounded-3xl border border-slate-100 animate-bento">
                <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center font-bold text-teal-600 border border-slate-100" x-text="item.name.charAt(0)"></div>
                <div class="flex-1 min-w-0">
                  <h4 class="text-sm font-bold text-slate-800 truncate" x-text="item.name"></h4>
                  <p class="text-xs font-semibold text-slate-500" x-text="item.sellingPrice"></p>
                </div>
                <div class="flex items-center gap-2">
                  <button @click="if(item.quantity > 1) item.quantity--; else removeFromCart(item.id)" class="w-8 h-8 flex items-center justify-center bg-white border border-slate-200 rounded-xl hover:border-rose-500 hover:text-rose-500 transition-colors">
                    <span class="text-base font-bold select-none">-</span>
                  </button>
                  <span class="text-base font-black text-slate-800 w-6 text-center" x-text="item.quantity"></span>
                  <button @click="item.quantity++" class="w-8 h-8 flex items-center justify-center bg-white border border-slate-200 rounded-xl hover:border-teal-500 hover:text-teal-600 transition-colors">
                    <span class="text-base font-bold select-none">+</span>
                  </button>
                </div>
              </div>
            </template>
          </div>

          <!-- Summary & Pay Button -->
          <div class="p-6 sm:p-8 bg-white border-t border-slate-100 space-y-6">
            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Subtotal</span>
                <span class="text-lg font-bold text-slate-800">₱ <span x-text="getTotal().toFixed(2)"></span></span>
              </div>
              <div class="flex items-center justify-between pt-4 border-t border-dashed border-slate-200">
                <span class="text-sm font-black text-slate-800 uppercase tracking-wider">Net Total</span>
                <span class="text-3xl font-black text-teal-600 tracking-tight">₱ <span x-text="getTotal().toFixed(2)"></span></span>
              </div>
            </div>

            <button 
              @click="openPaymentModal()" 
              :disabled="cart.length === 0" 
              class="w-full py-5 bg-teal-600 text-white font-bold rounded-3xl shadow-xl shadow-teal-600/20 hover:bg-teal-700 active:scale-[0.98] transition-all flex items-center justify-center gap-3 disabled:opacity-50 disabled:grayscale disabled:cursor-not-allowed group"
            >
              <span class="text-lg font-extrabold uppercase tracking-widest">Proceed to Pay</span>
              <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- Payment Modal -->
    <div x-show="paymentModalOpen" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-4 overflow-y-auto">
       <div x-show="paymentModalOpen" x-transition.opacity @click="paymentModalOpen = false" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
       <div x-show="paymentModalOpen" x-transition.scale.90 class="relative w-full max-w-lg bg-white rounded-[3rem] shadow-2xl overflow-hidden animate-bento">
          <div class="p-8 border-b border-slate-50 flex items-center justify-between">
             <h3 class="text-2xl font-bold text-slate-800">Checkout Payment</h3>
             <button @click="paymentModalOpen = false" class="p-2 hover:bg-slate-100 rounded-xl transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
          </div>
          <div class="p-8 space-y-8">
             <div class="bg-slate-50 p-6 rounded-4xl flex flex-col items-center text-center">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-[0.2em] mb-2">Amount to Pay</span>
                <span class="text-5xl font-black text-teal-600 tracking-tighter">₱ <span x-text="getTotal().toFixed(2)"></span></span>
             </div>
             <div class="space-y-4">
                <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-4">Cash Received</label>
                <div class="relative">
                   <span class="absolute left-6 top-1/2 -translate-y-1/2 text-2xl font-black text-slate-300">₱</span>
                   <input type="number" x-model="cashAmount" @input="calculateChange()" class="w-full pl-12 pr-6 py-6 bg-slate-50 border-2 border-transparent focus:border-teal-500 focus:bg-white rounded-3xl text-3xl font-black text-slate-800 focus:outline-none transition-all placeholder:text-slate-200" placeholder="0.00">
                </div>
             </div>
             <div class="flex items-center justify-between px-4">
                <span class="text-sm font-bold text-slate-500">Change Due</span>
                <span class="text-2xl font-black text-emerald-600">₱ <span x-text="calculateChange().toFixed(2)"></span></span>
             </div>
          </div>
          <div class="p-8 bg-slate-50/50 flex gap-4">
             <button @click="paymentModalOpen = false" class="flex-1 py-4 font-bold text-slate-500 hover:text-slate-700">Cancel</button>
             <button @click="confirmPayment()" :disabled="!isValidPayment()" class="flex-[2] py-5 bg-teal-600 text-white font-black rounded-2xl shadow-xl shadow-teal-600/20 hover:bg-teal-700 transition-all disabled:opacity-30 disabled:cursor-not-allowed">Complete Sale</button>
          </div>
       </div>
    </div>

    <!-- Success Toast -->
    <div x-show="showSuccess" x-transition.scale.90 x-cloak class="fixed bottom-10 left-1/2 -translate-x-1/2 z-110 bg-emerald-600 text-white px-8 py-4 rounded-4xl shadow-2xl flex items-center gap-4">
       <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center"><i data-lucide="check" class="w-6 h-6"></i></div>
       <span class="font-bold">Transaction Completed Successfully!</span>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        if (window.lucide) lucide.createIcons();
      });
      // Handle resize to auto-open sidebar if needed
      window.addEventListener('resize', () => {
         if (window.innerWidth >= 1024) sidebarOpen = true;
      });
    </script>
  </body>
</html>
