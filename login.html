<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d9488" />
    <title>Login | DavaoDeOro Pharmacy</title>
    <link href="/src/style.css" rel="stylesheet" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
  </head>
  <body class="antialiased text-slate-900 bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-8">
    
    <!-- Decorative Blurs -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <div class="absolute -top-[10%] -right-[10%] w-[500px] h-[500px] bg-teal-500/5 rounded-full blur-[100px]"></div>
        <div class="absolute -bottom-[10%] -left-[10%] w-[500px] h-[500px] bg-indigo-500/5 rounded-full blur-[100px]"></div>
    </div>

    <!-- Main Container -->
    <main class="w-full max-w-[1200px] min-h-[600px] relative z-10 flex flex-col md:flex-row bg-white rounded-4xl shadow-[0_40px_100px_-20px_rgba(0,0,0,0.15)] border border-slate-100 overflow-hidden animate-bento">
      
      <!-- Left Column: Branding & Logo -->
      <div class="w-full md:w-[45%] bg-teal-600 flex flex-col items-center justify-center p-12 md:p-20 relative overflow-hidden">
        <!-- Interactive Background Elements -->
        <div class="absolute top-0 left-0 w-full h-full">
            <div class="absolute -top-[20%] -left-[20%] w-[300px] h-[300px] bg-white/10 rounded-full blur-3xl animate-pulse"></div>
            <div class="absolute -bottom-[20%] -right-[20%] w-[400px] h-[400px] bg-teal-400/20 rounded-full blur-3xl animate-pulse delay-700"></div>
        </div>

        <div class="text-center space-y-10 relative z-10">
          <div class="relative inline-block group">
            <div class="absolute inset-0 bg-white/20 blur-3xl rounded-full opacity-60 group-hover:opacity-100 transition-opacity"></div>
            <div class="relative z-10 w-48 h-48 md:w-64 md:h-64 bg-white/10 backdrop-blur-xl rounded-[2.5rem] p-6 border border-white/20 shadow-2xl transition-transform duration-700 group-hover:scale-105 group-hover:rotate-1">
                <img src="/src/img/logo.png" alt="DavaoDeOro Pharmacy Logo" class="w-full h-full object-contain filter drop-shadow-2xl">
            </div>
          </div>
          <div class="space-y-4">
            <h2 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight">DavaoDeOro<br><span class="text-teal-200">Pharmacy</span></h2>
            <div class="h-1 w-20 bg-teal-400/50 mx-auto rounded-full"></div>
            <p class="text-teal-50/80 font-medium max-w-[280px] mx-auto text-sm md:text-base leading-relaxed">
              Premium Healthcare Management & Point of Sale System
            </p>
          </div>
        </div>

        <!-- System Version Badge -->
        <div class="absolute bottom-10 left-0 right-0 flex justify-center opacity-40">
            <span class="text-[10px] font-black tracking-widest text-white uppercase">Version 2.4.0 Build 2026</span>
        </div>
      </div>

      <!-- Right Column: Login Form -->
      <div class="w-full md:w-[55%] p-10 sm:p-16 lg:p-24 flex flex-col justify-center bg-white">
        <div class="max-w-[420px] mx-auto w-full">
          <div class="mb-12">
            <div class="inline-flex items-center gap-2 px-3 py-1 bg-teal-50 text-teal-700 rounded-full border border-teal-100 mb-6">
                <span class="w-2 h-2 bg-teal-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold uppercase tracking-wider">Secure Administrative Portal</span>
            </div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-4">Welcome Back</h1>
            <p class="text-slate-500 font-medium text-lg">Please enter your credentials to access the system.</p>
          </div>

          <!-- Login Form -->
          <form class="space-y-8" action="index.html">
            
            <!-- Username -->
            <div class="space-y-2">
              <label for="username" class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Account Identifier</label>
              <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-300 group-focus-within:text-teal-600 transition-colors">
                  <i data-lucide="user" class="w-5 h-5"></i>
                </div>
                <input type="text" id="username" 
                  class="w-full pl-14 pr-5 py-5 bg-slate-50 border border-slate-200 rounded-3xl text-slate-800 text-[15px] font-bold focus:outline-none focus:ring-4 focus:ring-teal-500/5 focus:border-teal-500 focus:bg-white transition-all shadow-sm" 
                  placeholder="Username or Email address" required>
              </div>
            </div>

            <!-- Password -->
            <div class="space-y-2">
              <div class="flex items-center justify-between ml-1 text-xs font-black uppercase tracking-[0.2em]">
                <label for="password" class="text-slate-400">Security Key</label>
                <a href="#" class="text-teal-600 hover:text-teal-700 transition-colors">Forgot?</a>
              </div>
              <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-300 group-focus-within:text-teal-600 transition-colors">
                  <i data-lucide="lock" class="w-5 h-5"></i>
                </div>
                <input type="password" id="password" 
                  class="w-full pl-14 pr-14 py-5 bg-slate-50 border border-slate-200 rounded-3xl text-slate-800 text-[15px] font-bold focus:outline-none focus:ring-4 focus:ring-teal-500/5 focus:border-teal-500 focus:bg-white transition-all shadow-sm" 
                  placeholder="••••••••••••" required>
                <button type="button" class="absolute inset-y-0 right-0 pr-5 flex items-center text-slate-300 hover:text-slate-500 focus:outline-none transition-colors">
                  <i data-lucide="eye" class="w-5 h-5"></i>
                </button>
              </div>
            </div>

            <!-- Options -->
            <div class="flex items-center justify-between ml-1">
              <label class="flex items-center gap-3 cursor-pointer group">
                <div class="relative">
                    <input type="checkbox" id="remember" class="peer sr-only">
                    <div class="w-5 h-5 bg-slate-100 border border-slate-200 rounded-lg peer-checked:bg-teal-600 peer-checked:border-teal-600 transition-all"></div>
                    <i data-lucide="check" class="absolute inset-0 w-3 h-3 text-white m-auto opacity-0 peer-checked:opacity-100 transition-opacity"></i>
                </div>
                <span class="text-[13px] font-bold text-slate-500 group-hover:text-slate-700 transition-colors">Remember device</span>
              </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full py-5 bg-slate-900 hover:bg-teal-600 text-white font-black rounded-3xl text-lg transition-all duration-500 shadow-2xl shadow-slate-900/10 hover:shadow-teal-600/30 hover:-translate-y-1 active:translate-y-0 flex items-center justify-center gap-3 group">
              <span>Access System</span>
              <i data-lucide="arrow-right" class="w-6 h-6 transition-transform group-hover:translate-x-2"></i>
            </button>
          </form>

          <!-- Footer Links -->
          <div class="mt-12 pt-8 border-t border-slate-50 flex flex-wrap gap-x-8 gap-y-4 justify-center">
             <a href="#" class="text-[10px] font-black text-slate-300 uppercase tracking-widest hover:text-teal-600 transition-colors">Privacy Policy</a>
             <a href="#" class="text-[10px] font-black text-slate-300 uppercase tracking-widest hover:text-teal-600 transition-colors">System Status</a>
             <a href="#" class="text-[10px] font-black text-slate-300 uppercase tracking-widest hover:text-teal-600 transition-colors">Support Portal</a>
          </div>
        </div>
      </div>
      
    </main>

    <!-- Bottom Info -->
    <div class="fixed bottom-6 left-0 right-0 hidden lg:flex justify-center z-10">
      <div class="flex items-center gap-6 text-[11px] font-bold text-slate-400 uppercase tracking-wider">
        <span>&copy; 2026 DavaoDeOro Pharmacy</span>
       
       
      </div>
    </div>

    <!-- Script to run lucide icons -->
    <script type="module" src="/src/main.js"></script>
    <script>
      // Wait for everything to load then run lucide
      window.addEventListener('load', () => {
        if (window.lucide) {
          lucide.createIcons();
        }
      });
    </script>
  </body>
</html>
