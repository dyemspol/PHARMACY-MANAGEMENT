<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d9488" />
    <title>Login | DavaoDeOro Pharmacy</title>
    <link href="/src/style.css" rel="stylesheet" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
  </head>
  <body class="antialiased text-slate-900 bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-8">
    
    <!-- Decorative Blurs -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <div class="absolute -top-[10%] -right-[10%] w-[500px] h-[500px] bg-teal-500/5 rounded-full blur-[100px]"></div>
        <div class="absolute -bottom-[10%] -left-[10%] w-[500px] h-[500px] bg-indigo-500/5 rounded-full blur-[100px]"></div>
    </div>

    <!-- Main Container -->
    <main class="w-full max-w-[1100px] relative z-10 flex flex-col md:flex-row bg-white rounded-[3rem] shadow-[0_32px_64px_-16px_rgba(0,0,0,0.12)] border border-slate-100 overflow-hidden animate-bento">
      
      <!-- Left Column: Branding & Logo -->
      <div class="w-full md:w-[45%] bg-teal-50/50 flex flex-col items-center justify-center p-12 md:p-16 border-b md:border-b-0 md:border-r border-slate-100">
        <div class="text-center space-y-8">
          <div class="relative inline-block group">
            <div class="absolute inset-0 bg-teal-500/10 blur-3xl rounded-full opacity-60 group-hover:opacity-100 transition-opacity"></div>
            <img src="/src/img/logo.png" alt="DavaoDeOro Pharmacy Logo" class="relative z-10 w-full max-w-[280px] h-auto drop-shadow-[0_20px_40px_rgba(13,148,136,0.15)] transition-transform duration-700 group-hover:scale-105">
          </div>
          <div class="space-y-3">
            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">DavaoDeOro Pharmacy</h2>
            <p class="text-slate-500 font-medium max-w-[280px] mx-auto text-sm leading-relaxed">
              Serving the community with excellence in healthcare management.
            </p>
          </div>
        </div>
      </div>

      <!-- Right Column: Login Form -->
      <div class="w-full md:w-[55%] p-8 sm:p-12 lg:p-16 flex flex-col justify-center">
        <div class="max-w-[400px] mx-auto w-full">
          <div class="mb-10">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-3">Sign In</h1>
            <p class="text-slate-500 font-medium">Access your administrative dashboard.</p>
          </div>

          <!-- Login Form -->
          <form class="space-y-6" action="index.html">
            
            <!-- Username -->
            <div class="space-y-1.5">
              <label for="username" class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Username / Email</label>
              <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-teal-600 transition-colors">
                  <i data-lucide="user" class="w-5 h-5"></i>
                </div>
                <input type="text" id="username" 
                  class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-800 text-[15px] font-semibold focus:outline-none focus:ring-4 focus:ring-teal-500/5 focus:border-teal-500 focus:bg-white transition-all shadow-sm" 
                  placeholder="Enter your username" required>
              </div>
            </div>

            <!-- Password -->
            <div class="space-y-1.5">
              <div class="flex items-center justify-between ml-1 text-xs font-bold uppercase tracking-widest">
                <label for="password" class="text-slate-500">Password</label>
                <a href="#" class="text-teal-600 hover:text-teal-700 transition-colors">Forgot?</a>
              </div>
              <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-teal-600 transition-colors">
                  <i data-lucide="lock" class="w-5 h-5"></i>
                </div>
                <input type="password" id="password" 
                  class="w-full pl-11 pr-12 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-800 text-[15px] font-semibold focus:outline-none focus:ring-4 focus:ring-teal-500/5 focus:border-teal-500 focus:bg-white transition-all shadow-sm" 
                  placeholder="••••••••" required>
                <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 focus:outline-none transition-colors">
                  <i data-lucide="eye" class="w-5 h-5"></i>
                </button>
              </div>
            </div>

            <!-- Remember Me -->
            <div class="flex items-center gap-3 ml-1">
              <input type="checkbox" id="remember" class="w-4 h-4 text-teal-600 border-slate-300 rounded focus:ring-teal-500 cursor-pointer">
              <label for="remember" class="text-[13px] font-bold text-slate-600 cursor-pointer select-none">Keep me signed in</label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full py-4 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-2xl text-[16px] transition-all duration-300 shadow-[0_12px_24px_-8px_rgba(15,23,42,0.3)] hover:shadow-[0_16px_32px_-8px_rgba(15,23,42,0.4)] hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2 group">
              <span>Enter System</span>
              <i data-lucide="chevron-right" class="w-5 h-5 transition-transform group-hover:translate-x-1"></i>
            </button>
          </form>

        
        </div>
      </div>
      
    </main>

    <!-- Bottom Info -->
    <div class="fixed bottom-6 left-0 right-0 hidden lg:flex justify-center z-10">
      <div class="flex items-center gap-6 text-[11px] font-bold text-slate-400 uppercase tracking-wider">
        <span>&copy; 2026 DavaoDeOro Pharmacy</span>
       
       
      </div>
    </div>

    <!-- Script to run lucide icons -->
    <script type="module" src="/src/main.js"></script>
    <script>
      // Wait for everything to load then run lucide
      window.addEventListener('load', () => {
        if (window.lucide) {
          lucide.createIcons();
        }
      });
    </script>
  </body>
</html>
