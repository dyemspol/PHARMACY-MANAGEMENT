<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1e40af" />
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/pwa-512x512.png">
    <title>Shift Management | RiGHT MEDS</title>
    <link href="/src/style.css" rel="stylesheet" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
    
    <script type="module" src="/src/auth.js"></script>
    <script type="module" src="/src/db.js"></script>
    <script type="module">
      import { printerService } from './src/services/printerService.js';
      window.printerService = printerService;
    </script>

    <style>
        [x-cloak] { display: none !important; }
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 10% 10%, #f1f5f9 0%, transparent 40%),
                        radial-gradient(circle at 90% 10%, #eff6ff 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, #fef2f2 0%, transparent 40%),
                        radial-gradient(circle at 10% 90%, #f8fafc 0%, transparent 40%);
        }
        .nav-link.active {
            background: #1e3a8a;
            color: white;
            box-shadow: 0 10px 20px -5px rgba(30, 58, 138, 0.4);
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            border-radius: 1.5rem;
            color: #64748b;
            transition: all 0.3s;
        }
        .nav-link:hover:not(.active) {
            background: #f8fafc;
            color: #1e3a8a;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="antialiased text-slate-900 overflow-x-hidden" x-data="{ 
    sidebarOpen: window.innerWidth >= 1024,
    isLoading: true,
    currentUser: window.auth.getCurrentUser(),
    targetDate: new Date().toISOString().split('T')[0],
    salesData: [],
    printerStatus: 'disconnected',

    async init() {
        if (!this.currentUser) {
            window.location.href = 'login.html';
            return;
        }

        window.addEventListener('resize', () => {
            if (window.innerWidth >= 1024) this.sidebarOpen = true;
        });

        const waitForPrinter = setInterval(() => {
            if (window.printerService) {
                clearInterval(waitForPrinter);
                this.printerStatus = window.printerService.isConnected() ? 'ready' : 'disconnected';
                window.printerService.onStatusChange = (status) => {
                    this.printerStatus = status;
                };
                if (localStorage.getItem('bluetoothDeviceId')) {
                    this.printerStatus = 'connecting';
                    window.printerService.reconnect().then(ok => {
                        if (!ok) this.printerStatus = 'disconnected';
                    }).catch(() => {
                        this.printerStatus = 'disconnected';
                    });
                }
            }
        }, 100);

        // Fetch shift records whenever the date changes
        this.$watch('targetDate', () => {
            this.fetchShiftRecords();
        });

        // First fetch
        const waitForDb = setInterval(() => {
            if (window.db && typeof window.db.getLocalDateStr === 'function') {
                clearInterval(waitForDb);
                this.targetDate = window.db.getLocalDateStr();
                this.fetchShiftRecords();
            }
        }, 100);
        
        // Timeout after 5 seconds if DB never appears
        setTimeout(() => {
            if (this.isLoading && this.salesData.length === 0) {
                clearInterval(waitForDb);
                this.isLoading = false;
            }
        }, 5000);
    },

    async fetchShiftRecords() {
        try {
            this.isLoading = true;
            console.log('Fetching shift records for date:', this.targetDate);
            
            // 1. Try explicit fetch from Firestore
            if (!window.db || typeof window.db.fetchShifts !== 'function') return; 
            
            const cashierFilter = this.currentUser?.role === 'admin' ? null : this.currentUser?.username;
            let results = await window.db.fetchShifts(this.targetDate, cashierFilter);
            
            // 2. Robust Fallback: If no data found for specific date, fetch latest 50 and filter locally
            // This handles cases where dates might have been saved with slightly different formats or timezone offsets
            if (results.length === 0) {
                console.warn('No direct matches in Firestore. Running robust fallback fetch...');
                const allRecent = await window.db.fetchShifts(null, cashierFilter);
                results = allRecent.filter(r => r.date === this.targetDate);
                
                if (results.length > 0) {
                    console.log('Found', results.length, 'records using local filtering fallback.');
                }
            }

            this.salesData = results;
            this.isLoading = false;
            this.$nextTick(() => { if(window.lucide) lucide.createIcons(); });
        } catch (error) {
            console.error('Error fetching shift records:', error);
            this.isLoading = false;
        }
    },

    get shiftRecords() {
        return this.salesData || [];
    },

    formatTime(timeStr) {
        if (!timeStr) return 'N/A';
        return new Date(timeStr).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    },

    calculateDuration(start, end) {
        if (!start || !end) return 'N/A';
        const diff = new Date(end) - new Date(start);
        const hours = Math.floor(diff / (1000 * 60 * 60));
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        return `${hours}h ${mins}m`;
    },

    async printShiftReport(shift) {
        if (!window.printerService || !window.printerService.isConnected()) {
            alert('Please connect your thermal printer first in Printer Setup.');
            return;
        }
        try {
            this.isLoading = true;
            const reportData = {
                posName: shift.cashierName,
                startTime: this.formatTime(shift.startTime),
                endTime: this.formatTime(shift.endTime),
                startingCash: parseFloat(shift.startingCash) || 0,
                cashPayments: shift.expectedSales,
                cashRefunds: shift.totalRefunded || 0,
                expectedCash: (parseFloat(shift.startingCash) || 0) + shift.expectedSales - (shift.totalRefunded || 0),
                actualCash: parseFloat(shift.actualCash) || 0,
                grossSales: shift.totalGross || shift.expectedSales,
                refunds: shift.totalRefunded || 0,
                discounts: shift.totalDiscount || 0,
                netSales: shift.expectedSales - (shift.totalRefunded || 0),
                shiftNumber: Math.floor(Math.random() * 900) + 100
            };
            const success = await window.printerService.printShiftReport(reportData);
            if (success) {
                alert('Shift report printed successfully!');
            } else {
                alert('Printing failed. Please check your printer connection.');
            }
        } catch (error) {
            alert('Error printing: ' + error.message);
        } finally {
            this.isLoading = false;
        }
    }
}">
    <div class="bg-mesh"></div>

    <!-- Sidebar -->
    <aside class="fixed inset-y-0 left-0 z-50 w-72 transition-all duration-500 lg:translate-x-0" :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'">
      <div class="h-full m-4 bg-white/80 backdrop-blur-2xl border border-white/40 rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden">
        <div class="px-6 py-8">
          <a href="index.html" class="flex items-center justify-center group cursor-pointer transition-transform hover:scale-105">
            <img src="/src/img/logo.png.jpg" alt="Logo" class="w-full h-auto object-contain transition-transform group-hover:scale-110">
          </a>
        </div>
        <nav class="flex-1 px-4 py-2 space-y-2 overflow-y-auto">
          <p class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-4">Main Menu</p>
          <a href="index.html" class="nav-link w-full" x-show="currentUser?.role === 'admin'"><i data-lucide="layout-grid" class="w-5 h-5"></i><span class="font-semibold text-[15px]">Dashboard</span></a>
          <a href="inventory.html" class="nav-link w-full" x-show="currentUser?.role === 'admin'"><i data-lucide="package" class="w-5 h-5"></i><span class="font-semibold text-[15px]">Inventory</span></a>
          <a href="POST_terminal.html" class="nav-link w-full"><i data-lucide="shopping-bag" class="w-5 h-5"></i><span class="font-semibold text-[15px]">POS Terminal</span></a>
          <a href="sales.html" class="nav-link w-full"><i data-lucide="bar-chart-3" class="w-5 h-5"></i><span class="font-semibold text-[15px]">Sales History</span></a>
          <a href="reports.html" class="nav-link w-full" x-show="currentUser?.role === 'admin'"><i data-lucide="file-text" class="w-5 h-5"></i><span class="font-semibold text-[15px]">Reports</span></a>
          <a href="shifting.html" class="nav-link w-full active"><i data-lucide="clock" class="w-5 h-5"></i><span class="font-semibold text-[15px]">Shifting</span></a>
          <a href="accounts.html" class="nav-link w-full" x-show="currentUser?.role === 'admin'"><i data-lucide="users" class="w-5 h-5"></i><span class="font-semibold text-[15px]">Accounts</span></a>
          <a href="printer_settings.html" class="nav-link w-full"><i data-lucide="printer" class="w-5 h-5"></i><span class="font-semibold text-[15px]">Printer Setup</span></a>
        </nav>
        <div class="p-6 mt-auto">
          <button @click="window.auth.logout()" class="w-full flex items-center justify-center gap-3 px-5 py-4 text-rose-500 hover:bg-rose-50 rounded-4xl transition-all duration-300 font-bold text-sm group">
            <i data-lucide="log-out" class="w-5 h-5 transition-transform group-hover:-translate-x-1"></i><span>Logout Account</span>
          </button>
        </div>
      </div>
    </aside>

    <main class="lg:ml-72 min-h-screen transition-all duration-500">
      <header class="h-auto min-h-24 flex items-center justify-between px-6 md:px-10 py-5 sticky top-0 z-40 bg-white/40 backdrop-blur-md border-b border-white/20">
        <div class="flex items-center gap-4 md:gap-6">
          <button @click="sidebarOpen = !sidebarOpen" class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center bg-white rounded-2xl shadow-sm border border-slate-100 lg:hidden">
            <i data-lucide="menu" class="w-5 h-5 md:w-6 md:h-6 text-slate-600"></i>
          </button>
          <div>
            <h2 class="text-xl md:text-2xl font-extrabold text-slate-800 tracking-tight leading-tight uppercase">Shift Management</h2>
            <p class="text-[10px] md:text-sm text-slate-400 font-medium whitespace-nowrap uppercase tracking-widest mt-1">Audit & Verify Employee Shifts</p>
          </div>
        </div>

        <div class="flex items-center gap-3">
          <button class="hidden sm:flex items-center gap-2 px-4 py-2 rounded-xl border shadow-sm mr-2 transition-all hover:scale-105 active:scale-95"
               :class="{
                 'border-emerald-100 bg-emerald-50 cursor-default': printerStatus === 'ready',
                 'border-amber-100 bg-amber-50 cursor-wait': printerStatus === 'connecting',
                 'border-rose-100 bg-rose-50 hover:bg-rose-100 cursor-pointer': printerStatus === 'disconnected'
               }"
               :disabled="printerStatus === 'connecting' || printerStatus === 'ready'"
               @click="if (printerStatus === 'disconnected') {
                 printerStatus = 'connecting';
                 const tryReconnect = async () => {
                   if (localStorage.getItem('bluetoothDeviceId')) {
                     const ok = await window.printerService.reconnect();
                     if (!ok) { await window.printerService.connect(); }
                   } else {
                     await window.printerService.connect();
                   }
                 };
                 tryReconnect().catch(() => { printerStatus = 'disconnected'; });
               }">
            <div class="w-2 h-2 rounded-full"
                 :class="{
                   'bg-emerald-500 animate-pulse': printerStatus === 'ready',
                   'bg-amber-500 animate-bounce': printerStatus === 'connecting',
                   'bg-rose-500': printerStatus === 'disconnected'
                 }"></div>
            <span class="text-[10px] font-black uppercase tracking-widest"
                  :class="{
                    'text-emerald-700': printerStatus === 'ready',
                    'text-amber-700': printerStatus === 'connecting',
                    'text-rose-700': printerStatus === 'disconnected'
                  }"
                  x-text="printerStatus === 'ready' ? 'Printer Online' : (printerStatus === 'connecting' ? 'Connecting...' : 'Tap to Connect')"></span>
          </button>
        </div>
      </header>

      <div class="p-8 space-y-8">
        <!-- Date Selection -->
        <div class="glass-card rounded-[2.5rem] p-6 flex items-center gap-6 shadow-sm border border-slate-100 w-full max-w-md">
            <div class="w-14 h-14 bg-blue-50 text-blue-900 rounded-2xl flex items-center justify-center">
                <i data-lucide="calendar" class="w-6 h-6"></i>
            </div>
            <div class="flex-1">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Select Shift Date</label>
                <input type="date" x-model="targetDate" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 font-black text-slate-700 outline-none focus:border-blue-900 transition-colors">
            </div>
        </div>

        <template x-if="isLoading">
            <div class="py-20 text-center text-slate-400 font-bold uppercase tracking-widest animate-pulse">Loading Shift Data...</div>
        </template>

        <template x-if="!isLoading && shiftRecords.length === 0">
            <div class="py-20 text-center flex flex-col items-center glass-card rounded-[3rem] border border-slate-100 shadow-sm">
                <div class="w-24 h-24 bg-slate-50 text-slate-300 rounded-full flex items-center justify-center mb-6 border border-slate-100"><i data-lucide="moon" class="w-10 h-10"></i></div>
                <h4 class="text-2xl font-black text-slate-700">No shift records found</h4>
                <p class="text-sm font-medium text-slate-400 mt-2">There are no finalized shifts on this date.</p>
            </div>
        </template>

        <!-- Shift Records Table -->
        <div class="glass-card rounded-[3rem] border border-slate-100 shadow-sm overflow-hidden" x-show="!isLoading && shiftRecords.length > 0">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[1200px]">
                    <thead>
                        <tr class="bg-slate-50/50">
                            <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Date</th>
                            <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Name</th>
                            <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Start-End Time</th>
                            <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Total Sales</th>
                            <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Expected</th>
                            <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Actual</th>
                            <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Status</th>
                            <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <template x-for="record in shiftRecords" :key="record.id">
                            <tr class="hover:bg-slate-50/50 transition-colors group">
                                <td class="px-8 py-6">
                                    <p class="text-sm font-bold text-slate-600" x-text="new Date(record.date).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'})"></p>
                                </td>
                                <td class="px-8 py-6">
                                    <div class="flex items-center gap-4">
                                        <div class="w-10 h-10 bg-blue-900 text-white rounded-xl flex items-center justify-center font-black text-xs" x-text="record.cashierName[0]"></div>
                                        <div>
                                            <p class="text-sm font-black text-slate-800 leading-none" x-text="record.cashierName"></p>
                                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1" x-text="record.cashierUsername"></p>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-8 py-6">
                                    <div class="flex items-center gap-2">
                                        <p class="text-[11px] font-bold text-slate-600 px-2 py-1 bg-slate-50 rounded-lg" x-text="formatTime(record.startTime)"></p>
                                        <span class="text-slate-300">→</span>
                                        <p class="text-[11px] font-bold text-slate-600 px-2 py-1 bg-slate-50 rounded-lg" x-text="formatTime(record.endTime)"></p>
                                    </div>
                                </td>
                                <td class="px-8 py-6">
                                    <p class="text-sm font-black text-slate-800" x-text="'₱' + (record.totalGross || 0).toLocaleString('en-PH', {minimumFractionDigits:2})"></p>
                                </td>
                                <td class="px-8 py-6">
                                    <p class="text-sm font-black text-slate-600" x-text="'₱' + record.expectedSales.toLocaleString('en-PH', {minimumFractionDigits:2})"></p>
                                </td>
                                <td class="px-8 py-6">
                                    <p class="text-sm font-black text-emerald-600" x-text="'₱' + record.actualCash.toLocaleString('en-PH', {minimumFractionDigits:2})"></p>
                                </td>
                                <td class="px-8 py-6">
                                    <span :class="record.discrepancy === 0 ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : (record.discrepancy < 0 ? 'bg-rose-50 text-rose-600 border-rose-100' : 'bg-blue-50 text-blue-600 border-blue-100')"
                                          class="px-3 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest border border-dashed"
                                          x-text="record.discrepancy === 0 ? 'Exact Match' : (record.discrepancy < 0 ? 'Shortage (₱' + Math.abs(record.discrepancy).toLocaleString('en-PH', {minimumFractionDigits:2}) + ')' : 'Overage (₱' + record.discrepancy.toLocaleString('en-PH', {minimumFractionDigits:2}) + ')')"></span>
                                </td>
                                <td class="px-8 py-6 text-right">
                                    <button @click="printShiftReport(record)" class="w-10 h-10 bg-slate-50 text-blue-900 hover:bg-blue-900 hover:text-white border border-transparent rounded-xl flex items-center justify-center transition-all ml-auto hover:shadow-lg hover:shadow-blue-900/20 active:scale-95">
                                        <i data-lucide="printer" class="w-4 h-4"></i>
                                    </button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
      </div>
    </main>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script type="module" src="/src/main.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => { if (window.lucide) lucide.createIcons(); });
      document.addEventListener('alpine:initialized', () => { if (window.lucide) lucide.createIcons(); });
    </script>
</body>
</html>
