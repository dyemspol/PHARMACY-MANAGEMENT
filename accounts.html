<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1e40af" />
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/pwa-512x512.png">
    <title>Account Management | RiGHT MEDS</title>
    <link href="/src/style.css" rel="stylesheet" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
    
    <script type="module" src="/src/auth.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 10% 10%, #f1f5f9 0%, transparent 40%),
                        radial-gradient(circle at 90% 10%, #eff6ff 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, #fef2f2 0%, transparent 40%),
                        radial-gradient(circle at 10% 90%, #f8fafc 0%, transparent 40%);
        }
        .nav-link.active {
            background: #1e3a8a;
            color: white;
            box-shadow: 0 10px 20px -5px rgba(30, 58, 138, 0.4);
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            border-radius: 1.5rem;
            color: #64748b;
            transition: all 0.3s;
        }
        .nav-link:hover:not(.active) {
            background: #f8fafc;
            color: #1e3a8a;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="antialiased text-slate-900 overflow-x-hidden" x-data="{ 
    sidebarOpen: window.innerWidth >= 1024,
    showCreateModal: false,
    currentUser: window.auth.getCurrentUser(),
    accounts: [],
    newAccount: {
        username: '',
        password: '',
        role: 'employee',
        name: ''
    },
    async init() {
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 1024) this.sidebarOpen = true;
        });
        await this.loadAccounts();
    },
    async loadAccounts() {
        try {
            this.accounts = await window.auth.getUsers();
            if (this.accounts.length === 0) {
                console.warn('Accounts: No accounts found in Firestore.');
            }
        } catch (error) {
            console.error('Accounts: Error loading list:', error);
            alert('Failed to load accounts. Please ensure you are connected to the internet.');
        }
    },
    async createAccount() {
        if (!this.newAccount.username || !this.newAccount.password || !this.newAccount.name) {
            alert('Please fill all fields');
            return;
        }
        
        try {
            await window.auth.saveUser(this.newAccount);
            await this.loadAccounts();
            this.showCreateModal = false;
            this.newAccount = { username: '', password: '', role: 'employee', name: '' };
            setTimeout(() => lucide.createIcons(), 50);
        } catch (error) {
            alert(error.message || 'Error creating account');
        }
    },
    async deleteAccount(username) {
        if (username === 'admin') {
            alert('Cannot delete primary administrator account');
            return;
        }
        if (confirm(`Are you sure you want to delete account: ${username}?`)) {
            try {
                await window.auth.deleteUser(username);
                await this.loadAccounts();
                setTimeout(() => lucide.createIcons(), 50);
            } catch (error) {
                alert('Error deleting account');
            }
        }
    }
}">
    <div class="bg-mesh"></div>

    <!-- Create Account Modal -->
    <div x-show="showCreateModal" x-cloak class="fixed inset-0 z-100 flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm">
        <div class="glass-card max-w-md w-full p-8 rounded-[2.5rem] shadow-2xl animate-bento" @click.away="showCreateModal = false">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-2xl font-black text-slate-800 tracking-tight">Create Employee</h3>
                <button @click="showCreateModal = false" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block pl-2">Full Name</label>
                    <input type="text" x-model="newAccount.name" placeholder="Juan Dela Cruz" class="w-full px-6 py-4 bg-white border border-slate-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-teal-500/5 focus:border-teal-500 transition-all text-sm font-medium">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block pl-2">Username</label>
                    <input type="text" x-model="newAccount.username" placeholder="juan_dc" class="w-full px-6 py-4 bg-white border border-slate-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-teal-500/5 focus:border-teal-500 transition-all text-sm font-medium">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block pl-2">Initial Password</label>
                    <input type="password" x-model="newAccount.password" placeholder="••••••••" class="w-full px-6 py-4 bg-white border border-slate-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-teal-500/5 focus:border-teal-500 transition-all text-sm font-medium">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block pl-2">System Role</label>
                    <select x-model="newAccount.role" class="w-full px-6 py-4 bg-white border border-slate-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-teal-500/5 focus:border-teal-500 transition-all text-sm font-medium appearance-none">
                        <option value="employee">Employee / Staff</option>
                        <option value="admin">System Administrator</option>
                    </select>
                </div>
            </div>

            <div class="mt-8 flex gap-3">
                <button @click="showCreateModal = false" class="flex-1 py-4 bg-slate-50 text-slate-600 font-bold rounded-2xl hover:bg-slate-100 transition-all">Cancel</button>
                <button @click="createAccount()" class="flex-1 py-4 bg-blue-900 text-white font-bold rounded-2xl shadow-lg shadow-blue-900/20 hover:bg-blue-800 transition-all">Create Instance</button>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="fixed inset-y-0 left-0 z-50 w-72 transition-all duration-500 lg:translate-x-0" :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'">
      <div class="h-full m-4 bg-white/80 backdrop-blur-2xl border border-white/40 rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden">
        <div class="px-6 py-8">
          <a href="index.html" class="flex items-center justify-center group cursor-pointer transition-transform hover:scale-105">
            <img src="/src/img/logo.png.jpg" alt="Logo" class="w-full h-auto object-contain transition-transform group-hover:scale-110">
          </a>
        </div>
        <nav class="flex-1 px-4 py-2 space-y-2 overflow-y-auto">
          <p class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-4">Main Menu</p>
          <a href="index.html" class="nav-link w-full" x-show="currentUser?.role === 'admin'"><i data-lucide="layout-grid" class="w-5 h-5"></i><span class="font-semibold text-[15px]">Dashboard</span></a>
          <a href="inventory.html" class="nav-link w-full" x-show="currentUser?.role === 'admin'"><i data-lucide="package" class="w-5 h-5"></i><span class="font-semibold text-[15px]">Inventory</span></a>
          <a href="POST_terminal.html" class="nav-link w-full"><i data-lucide="shopping-bag" class="w-5 h-5"></i><span class="font-semibold text-[15px]">POS Terminal</span></a>
          <a href="sales.html" class="nav-link w-full"><i data-lucide="bar-chart-3" class="w-5 h-5"></i><span class="font-semibold text-[15px]">Sales History</span></a>
          <a href="reports.html" class="nav-link w-full" x-show="currentUser?.role === 'admin'"><i data-lucide="file-text" class="w-5 h-5"></i><span class="font-semibold text-[15px]">Reports</span></a>
          <a href="shifting.html" class="nav-link w-full" x-show="currentUser?.role === 'admin'"><i data-lucide="clock" class="w-5 h-5"></i><span class="font-semibold text-[15px]">Shifting</span></a>
          <a href="accounts.html" class="nav-link w-full active" x-show="currentUser?.role === 'admin'"><i data-lucide="users" class="w-5 h-5"></i><span class="font-semibold text-[15px]">Accounts</span></a>
          <a href="printer_settings.html" class="nav-link w-full"><i data-lucide="printer" class="w-5 h-5"></i><span class="font-semibold text-[15px]">Printer Setup</span></a>
        </nav>
        <div class="p-6 mt-auto">
          <button @click="window.auth.logout()" class="w-full flex items-center justify-center gap-3 px-5 py-4 text-rose-500 hover:bg-rose-50 rounded-4xl transition-all duration-300 font-bold text-sm group">
            <i data-lucide="log-out" class="w-5 h-5 transition-transform group-hover:-translate-x-1"></i><span>Logout Account</span>
          </button>
        </div>
      </div>
    </aside>

    <main class="lg:ml-72 min-h-screen transition-all duration-500">
      <header class="h-auto min-h-24 flex items-center justify-between px-6 md:px-10 py-5 sticky top-0 z-40 bg-white/40 backdrop-blur-md border-b border-white/20">
        <div class="flex items-center gap-4 md:gap-6">
          <button @click="sidebarOpen = !sidebarOpen" class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center bg-white rounded-2xl shadow-sm border border-slate-100 lg:hidden">
            <i data-lucide="menu" class="w-5 h-5 md:w-6 md:h-6"></i>
          </button>
          <div>
            <h2 class="text-xl md:text-2xl font-extrabold text-slate-800 tracking-tight leading-tight">Account Management</h2>
            <p class="text-[10px] md:text-sm text-slate-400 font-medium whitespace-nowrap">Manage system users and permissions</p>
          </div>
        </div>
      </header>

      <div class="p-8 space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 animate-bento">
            <div class="glass-card rounded-[2.5rem] p-8 flex items-center gap-6">
                <div class="w-16 h-16 bg-blue-50 text-blue-900 rounded-2xl flex items-center justify-center">
                    <i data-lucide="users" class="w-8 h-8"></i>
                </div>
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Accounts</p>
                    <h3 class="text-2xl font-black text-slate-800" x-text="accounts.length"></h3>
                </div>
            </div>
            <div class="glass-card rounded-[2.5rem] p-8 flex items-center gap-6">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center">
                    <i data-lucide="shield-check" class="w-8 h-8"></i>
                </div>
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Administrators</p>
                    <h3 class="text-2xl font-black text-slate-800" x-text="accounts.filter(a => a.role === 'admin').length"></h3>
                </div>
            </div>
            <div class="glass-card rounded-[2.5rem] p-8 flex items-center gap-6">
                <div class="w-16 h-16 bg-purple-50 text-purple-600 rounded-2xl flex items-center justify-center">
                    <i data-lucide="user-plus" class="w-8 h-8"></i>
                </div>
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Staff Accounts</p>
                    <h3 class="text-2xl font-black text-slate-800" x-text="accounts.filter(a => a.role === 'employee').length"></h3>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[3rem] p-8">
            <div class="flex items-center justify-between mb-8">
                <h4 class="text-xl font-black text-slate-800 uppercase tracking-tight">Active System Accounts</h4>
                <button @click="showCreateModal = true" class="px-6 py-3 bg-red-600 text-white font-bold rounded-2xl shadow-lg shadow-red-500/20 hover:bg-red-700 transition-all flex items-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    <span>Create New Employee Account</span>
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50">
                            <th class="px-4 md:px-8 py-4 md:py-6 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">User Details</th>
                            <th class="px-4 md:px-8 py-4 md:py-6 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">Role</th>
                            <th class="px-4 md:px-8 py-4 md:py-6 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest hidden md:table-cell">Created</th>
                            <th class="px-4 md:px-8 py-4 md:py-6 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest hidden lg:table-cell">Status</th>
                            <th class="px-4 md:px-8 py-4 md:py-6 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <template x-for="account in accounts" :key="account.username">
                            <tr class="hover:bg-slate-50/50 transition-colors group">
                                <td class="px-4 md:px-8 py-4 md:py-6">
                                    <div class="flex items-center gap-3 md:gap-4">
                                        <div class="w-10 h-10 md:w-12 md:h-12 bg-blue-900 text-white rounded-2xl flex items-center justify-center font-bold text-base md:text-lg" x-text="account.name[0]"></div>
                                        <div>
                                            <p class="text-xs md:text-sm font-bold text-slate-800" x-text="account.name"></p>
                                            <p class="text-[9px] md:text-[10px] text-slate-400 font-bold uppercase tracking-widest" x-text="account.username"></p>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-4 md:px-8 py-4 md:py-6">
                                    <span :class="account.role === 'admin' ? 'bg-blue-50 text-blue-900 border-blue-100' : 'bg-red-50 text-red-600 border-red-100'" 
                                          class="px-2 md:px-3 py-1 border rounded-full text-[9px] md:text-[10px] font-black uppercase tracking-widest" 
                                          x-text="account.role"></span>
                                </td>
                                <td class="px-4 md:px-8 py-4 md:py-6 hidden md:table-cell">
                                    <p class="text-xs md:text-sm font-bold text-slate-700" x-text="new Date(account.createdAt).toLocaleDateString()"></p>
                                </td>
                                <td class="px-4 md:px-8 py-4 md:py-6 hidden lg:table-cell">
                                    <span class="inline-flex items-center gap-1.5 px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-black uppercase tracking-widest border border-emerald-100">
                                        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                                        Active
                                    </span>
                                </td>
                                <td class="px-4 md:px-8 py-4 md:py-6 text-right">
                                    <button @click="deleteAccount(account.username)" class="w-8 h-8 md:w-10 md:h-10 bg-slate-50 hover:bg-rose-500 hover:text-white rounded-xl flex items-center justify-center transition-all group/del ml-auto">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
      </div>
    </main>

    <script>
      document.addEventListener('alpine:initialized', () => {
          lucide.createIcons();
      });
      // Initial lucide call
      lucide.createIcons();
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
