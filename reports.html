<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reports & Analytics | DavaoDeOro</title>
    <link href="/src/style.css" rel="stylesheet" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script type="module" src="/src/db.js"></script>
    
    <style>
      [x-cloak] { display: none !important; }
      .bg-reports-mesh {
        position: fixed;
        inset: 0;
        z-index: -1;
        background: 
          radial-gradient(circle at 0% 0%, rgba(20, 184, 166, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 100% 100%, rgba(79, 70, 229, 0.05) 0%, transparent 50%),
          #f8fafc;
      }
    </style>
  </head>
  <body class="antialiased text-slate-900 overflow-x-hidden" x-data="{ 
    sidebarOpen: window.innerWidth > 1024,
    salesData: [],
    inventoryData: [],
    totalRevenue: 0,
    totalTransactions: 0,
    averageTransaction: 0,
    netProfit: 0,
    topSelling: [],
    lowStockCount: 0,
    lowStockItems: [],
    isLoading: true,
    
    async init() {
       const waitForDb = setInterval(async () => {
        if (window.db && window.salesDb) {
          clearInterval(waitForDb);
          
          // Fetch inventory
          this.inventoryData = await window.db.fetchInventory();
          this.calculateLowStock();
          
          // Fetch sales real-time
          window.salesDb.fetchSalesData((sales) => {
            this.salesData = sales;
            this.calculateMetrics();
            this.calculateTopSelling();
            this.isLoading = false;
            setTimeout(() => {
                if(window.lucide) {
                    lucide.createIcons();
                }
            }, 50);
          });
        }
      }, 100);
    },
    calculateLowStock() {
       let allLowStock = this.inventoryData.filter(item => {
           let stockNum = 0;
           if(typeof item.stock === 'string') {
               stockNum = parseInt(item.stock.replace(' units', '')) || 0;
           } else {
               stockNum = item.stock || 0;
           }
           item.numericStock = stockNum;
           return stockNum < 15; // Defining low stock threshold as < 15
       });
       
       // Sort by lowest stock first
       allLowStock.sort((a,b) => a.numericStock - b.numericStock);
       
       this.lowStockCount = allLowStock.length;
       this.lowStockItems = allLowStock.slice(0, 10);
    },
    
    calculateMetrics() {
        this.totalTransactions = this.salesData.length;
        
        this.totalRevenue = this.salesData.reduce((sum, sale) => {
            let total = sale.total;
            if(typeof total === 'string') {
                total = parseFloat(total.replace('₱', '').replace(',','')) || 0;
            }
            return sum + total;
        }, 0);
        
        this.averageTransaction = this.totalTransactions > 0 ? (this.totalRevenue / this.totalTransactions) : 0;
        
        // Simplified Net Profit Calculation: Assuming 30% margin for demo purposes if buyingPrice isn't reliably available in all legacy sales
        // Alternatively, calculate exact if we map cart items to inventory buying price
        let exactCost = 0;
        this.salesData.forEach(sale => {
            if(sale.cart) {
                sale.cart.forEach(item => {
                    let cost = parseFloat(item.buyingPrice) || 0;
                    if(typeof item.buyingPrice === 'string' && item.buyingPrice.includes('₱')) {
                        cost = parseFloat(item.buyingPrice.replace('₱', '').replace(',','')) || 0;
                    }
                    // if cost exists use it, else assume rough 70% cost
                    exactCost += (cost > 0 ? (cost * item.quantity) : (item.numericPrice * item.quantity * 0.7)); 
                });
            }
        });
        
        this.netProfit = this.totalRevenue - exactCost;
    },
    
    calculateTopSelling() {
        const itemMap = {};
        this.salesData.forEach(sale => {
            if(sale.cart) {
                sale.cart.forEach(item => {
                    if(!itemMap[item.name]) {
                        itemMap[item.name] = { 
                            name: item.name, 
                            category: item.category || 'General', 
                            units: 0, 
                            revenue: 0 
                        };
                    }
                    itemMap[item.name].units += item.quantity;
                    itemMap[item.name].revenue += (item.numericPrice * item.quantity);
                });
            }
        });
        
        this.topSelling = Object.values(itemMap)
            .sort((a, b) => b.units - a.units)
            .slice(0, 5); // top 5
    }
  }">
    
    <!-- Mobile Sidebar Backdrop -->
    <div 
      x-show="sidebarOpen" 
      @click="sidebarOpen = false" 
      x-cloak
      class="fixed inset-0 z-40 bg-slate-900/40 backdrop-blur-sm lg:hidden transition-opacity"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
    ></div>
    
    <div class="bg-reports-mesh"></div>

    <aside 
      class="fixed inset-y-0 left-0 z-50 w-72 transition-all duration-500 lg:translate-x-0"
      :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
    >
      <!-- Mobile Toggle Arrow (Overlapping Edge) -->
      <button 
        x-show="sidebarOpen"
        x-cloak
        @click="sidebarOpen = false" 
        class="lg:hidden absolute -right-4 top-12 w-10 h-10 bg-teal-600 text-white rounded-full flex items-center justify-center shadow-xl shadow-teal-500/40 border-4 border-white z-50 hover:scale-110 active:scale-95 transition-all"
      >
        <i data-lucide="chevron-left" class="w-5 h-5"></i>
      </button>

      <div class="h-full m-4 bg-white/80 backdrop-blur-2xl border border-white/40 rounded-4xl shadow-2xl flex flex-col overflow-hidden">
        <div class="p-8">
          <a href="index.html" class="flex items-center gap-4 group cursor-pointer transition-transform hover:scale-105">
            <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-xl shadow-teal-500/10 border border-teal-50 overflow-hidden transition-transform group-hover:scale-110">
              <img src="/src/img/logo.png" alt="Logo" class="w-full h-full object-cover">
            </div>
            <div>
              <h1 class="text-xl font-extrabold tracking-tight text-slate-800 leading-none">DavaoDeOro</h1>
              <span class="text-[10px] font-bold uppercase tracking-widest text-teal-600 mt-1 block">Pharmacy</span>
            </div>
          </a>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 px-4 py-2 space-y-2 overflow-y-auto">
          <p class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-4">Main Menu</p>
          
          <a href="index.html" class="nav-link w-full">
            <i data-lucide="layout-grid" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Dashboard</span>
          </a>

          <a href="inventory.html" class="nav-link w-full">
            <i data-lucide="package" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Inventory</span>
          </a>

          <a href="POST_terminal.html" class="nav-link w-full">
            <i data-lucide="shopping-bag" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">POS Terminal</span>
          </a>

          <a href="sales.html" class="nav-link w-full">
            <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Sales History</span>
          </a>

          <a href="reports.html" class="nav-link w-full active">
            <i data-lucide="file-text" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Reports</span>
          </a>

        </nav>

        <!-- Logout -->
        <div class="p-6 mt-auto">
          <button class="w-full flex items-center gap-3 px-5 py-4 text-rose-500 hover:bg-rose-50 rounded-4xl transition-all duration-300 font-bold text-sm group">
            <i data-lucide="log-out" class="w-5 h-5 transition-transform group-hover:-translate-x-1"></i>
            <span>Logout Account</span>
          </button>
        </div>
      </div>
    </aside>

    <!-- Content -->
    <main class="lg:ml-72 min-h-screen transition-all duration-500">
      
      <!-- Header -->
      <header class="h-24 flex items-center justify-between px-10 sticky top-0 z-40">
          <div class="flex items-center gap-4 md:gap-6">
            <button @click="sidebarOpen = !sidebarOpen" class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center bg-white rounded-2xl shadow-sm border border-slate-100 lg:hidden">
              <i data-lucide="menu" class="w-5 h-5 md:w-6 md:h-6"></i>
            </button>
            <div>
              <h2 class="text-xl md:text-2xl font-extrabold text-slate-800 tracking-tight leading-tight">Reports</h2>
              <p class="text-[10px] md:text-sm text-slate-400 font-medium whitespace-nowrap">Analyze your pharmacy performance</p>
            </div>
          </div>

      </header>

      <!-- Reports Body -->
      <div class="p-6 md:p-10 space-y-8">
        
        <!-- Export Quick Actions -->
        <div class="space-y-4 animate-bento">
          <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Export Quick Actions</label>
          <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
            <button class="flex items-center gap-3 p-4 bg-blue-600 text-white rounded-3xl shadow-lg shadow-blue-500/20 hover:scale-[1.03] transition-all group">
              <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center shrink-0">
                <i data-lucide="download" class="w-5 h-5 text-white"></i>
              </div>
              <span class="text-[11px] font-bold leading-tight uppercase tracking-tight text-left">Export<br>PDF</span>
            </button>

            <button class="flex items-center gap-3 p-4 bg-purple-600 text-white rounded-3xl shadow-lg shadow-purple-500/20 hover:scale-[1.03] transition-all group">
              <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center shrink-0">
                <i data-lucide="archive" class="w-5 h-5 text-white"></i>
              </div>
              <span class="text-[11px] font-bold leading-tight uppercase tracking-tight text-left">Export Stock<br>Report</span>
            </button>

            <button class="flex items-center gap-3 p-4 bg-emerald-600 text-white rounded-3xl shadow-lg shadow-emerald-500/20 hover:scale-[1.03] transition-all group">
              <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center shrink-0">
                <i data-lucide="file-spreadsheet" class="w-5 h-5 text-white"></i>
              </div>
              <span class="text-[11px] font-bold leading-tight uppercase tracking-tight text-left">Export Sales<br>Excel</span>
            </button>

            <button class="flex items-center gap-3 p-4 bg-amber-600 text-white rounded-3xl shadow-lg shadow-amber-500/20 hover:scale-[1.03] transition-all group">
              <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center shrink-0">
                <i data-lucide="boxes" class="w-5 h-5 text-white"></i>
              </div>
              <span class="text-[11px] font-bold leading-tight uppercase tracking-tight text-left">Export Stock<br>Excel</span>
            </button>

            <button class="flex items-center gap-3 p-4 bg-rose-600 text-white rounded-3xl shadow-lg shadow-rose-500/20 hover:scale-[1.03] transition-all group">
              <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center shrink-0">
                <i data-lucide="clipboard-list" class="w-5 h-5 text-white"></i>
              </div>
              <span class="text-[11px] font-bold leading-tight uppercase tracking-tight text-left">Detailed Stock/Cash<br>Report</span>
            </button>
          </div>
        </div>
        
        <!-- Filter Card -->
        <div class="bg-white rounded-4xl border border-slate-100/50 p-8 shadow-sm flex items-end gap-10 animate-bento">
          <div class="space-y-3 flex-1">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Period</label>
            <div class="relative">
              <select class="w-full pl-6 pr-12 py-5 bg-slate-50 border border-slate-100 rounded-3xl focus:outline-none focus:ring-4 focus:ring-teal-500/5 focus:border-teal-500 transition-all text-sm shadow-sm font-bold text-slate-700 appearance-none cursor-pointer">
                <option>Daily Sales</option>
                <option>Weekly Report</option>
                <option>Monthly Analytics</option>
              </select>
              <i data-lucide="chevron-down" class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5 pointer-events-none"></i>
            </div>
          </div>

          <div class="space-y-3 flex-1">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Date</label>
            <div class="relative">
              <input type="date" value="2025-09-10" class="w-full px-6 py-5 bg-slate-50 border border-slate-100 rounded-3xl focus:outline-none focus:ring-4 focus:ring-teal-500/5 focus:border-teal-500 transition-all text-sm shadow-sm font-bold text-slate-700 cursor-pointer">
            </div>
          </div>
          
          <div class="grow shrink"></div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 animate-bento delay-1">
          <!-- Total Revenue -->
          <div class="p-6 bg-emerald-50 rounded-4xl border border-emerald-100 flex items-center justify-between group hover:scale-[1.02] transition-transform">
            <div>
              <p class="text-[11px] font-black text-emerald-600 uppercase tracking-widest mb-1">Total Revenue</p>
              <h3 class="text-2xl font-black text-emerald-900 tracking-tighter" x-text="'₱' + totalRevenue.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})"></h3>
            </div>
            <div class="w-14 h-14 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-emerald-600 group-hover:bg-emerald-500 group-hover:text-white transition-all">
              <i data-lucide="dollar-sign" class="w-6 h-6"></i>
            </div>
          </div>

          <!-- Total Transactions -->
          <div class="p-6 bg-blue-50 rounded-4xl border border-blue-100 flex items-center justify-between group hover:scale-[1.02] transition-transform">
            <div>
              <p class="text-[11px] font-black text-blue-600 uppercase tracking-widest mb-1">Total Transactions</p>
              <h3 class="text-2xl font-black text-blue-900 tracking-tighter" x-text="totalTransactions"></h3>
            </div>
            <div class="w-14 h-14 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-600 group-hover:bg-blue-500 group-hover:text-white transition-all">
              <i data-lucide="file-text" class="w-6 h-6"></i>
            </div>
          </div>

          <!-- Average Transaction -->
          <div class="p-6 bg-purple-50 rounded-4xl border border-purple-100 flex items-center justify-between group hover:scale-[1.02] transition-transform">
            <div>
              <p class="text-[11px] font-black text-purple-600 uppercase tracking-widest mb-1">Average Transaction</p>
              <h3 class="text-2xl font-black text-purple-900 tracking-tighter" x-text="'₱' + averageTransaction.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})"></h3>
            </div>
            <div class="w-14 h-14 bg-purple-500/10 rounded-2xl flex items-center justify-center text-purple-600 group-hover:bg-purple-500 group-hover:text-white transition-all">
              <i data-lucide="trending-up" class="w-6 h-6"></i>
            </div>
          </div>

          <!-- Net Profit -->
          <div class="p-6 bg-amber-50 rounded-4xl border border-amber-100 flex items-center justify-between group hover:scale-[1.02] transition-transform">
            <div>
              <p class="text-[11px] font-black text-amber-600 uppercase tracking-widest mb-1">Estimated Net Profit</p>
              <h3 class="text-2xl font-black text-amber-900 tracking-tighter" x-text="'₱' + netProfit.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})"></h3>
            </div>
            <div class="w-14 h-14 bg-amber-500/10 rounded-2xl flex items-center justify-center text-amber-600 group-hover:bg-amber-500 group-hover:text-white transition-all">
              <i data-lucide="banknote" class="w-6 h-6"></i>
            </div>
          </div>
        </div>

        <!-- Two Column Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-bento delay-2">
          
          <!-- Top Selling -->
          <div class="bg-white rounded-4xl border border-slate-100/50 p-8 shadow-sm space-y-6">
            <div class="flex items-center gap-3 px-2">
              <i data-lucide="trending-up" class="w-5 h-5 text-blue-500"></i>
              <h4 class="text-lg font-black text-slate-800 tracking-tight">Top Selling Medicines</h4>
            </div>
            
            <div class="space-y-4">
              <template x-if="isLoading">
                 <div class="p-8 flex flex-col items-center justify-center space-y-3">
                   <i data-lucide="loader-2" class="w-8 h-8 text-slate-300 animate-spin"></i>
                   <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Scanning Sales</p>
                 </div>
              </template>
              <template x-if="!isLoading && topSelling.length === 0">
                 <p class="text-sm font-bold text-slate-400 p-4 text-center">No sales data to generate selling statistics.</p>
              </template>
              <template x-for="(medicine, index) in topSelling">
                <div class="flex items-center justify-between p-5 bg-slate-50/50 rounded-3xl border border-slate-100 hover:border-teal-500/20 transition-all cursor-pointer group">
                  <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-amber-500 text-white flex items-center justify-center font-bold text-sm shadow-lg shadow-amber-500/20" x-text="index + 1"></div>
                    <div>
                      <h5 class="font-bold text-slate-800" x-text="medicine.name"></h5>
                      <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tight" x-text="medicine.category"></p>
                    </div>
                  </div>
                  <div class="text-right">
                    <p class="text-xs font-bold text-slate-700" x-text="medicine.units + ' units'"></p>
                    <p class="text-sm font-black text-emerald-600 tracking-tight" x-text="'₱' + medicine.revenue.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})"></p>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Stock Alerts -->
          <div class="bg-white rounded-4xl border border-slate-100/50 p-8 shadow-sm space-y-6">
            <div class="flex items-center justify-between px-2">
              <div class="flex items-center gap-3">
                <i data-lucide="alert-triangle" class="w-5 h-5 text-rose-500"></i>
                <h4 class="text-lg font-black text-slate-800 tracking-tight">Stock Alerts</h4>
              </div>
              <span class="px-3 py-1 bg-rose-50 text-rose-600 rounded-full text-[10px] font-black uppercase tracking-tighter border border-rose-100/50" x-show="lowStockCount > 0" x-text="`${lowStockCount} Total Items`"></span>
            </div>
            
            <div class="space-y-4">
              <!-- Loading State -->
              <template x-if="isLoading">
                 <div class="p-6 rounded-3xl border border-slate-100 bg-slate-50 flex items-center gap-4 group transition-all opacity-80">
                  <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm text-slate-500">
                    <i data-lucide="loader-2" class="w-6 h-6 animate-spin"></i>
                  </div>
                  <div>
                    <h5 class="font-bold tracking-tight text-slate-900">Scanning Inventory</h5>
                    <p class="text-xs font-medium text-slate-600/70">Connecting to real-time stock counts...</p>
                  </div>
                </div>
              </template>

              <!-- When No Items Are Low on Stock -->
              <template x-if="!isLoading && lowStockItems.length === 0">
                 <div class="p-6 rounded-3xl border border-emerald-100 bg-emerald-50 flex items-center gap-4 group transition-all opacity-80">
                  <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm text-emerald-500">
                    <i data-lucide="check-circle" class="w-6 h-6"></i>
                  </div>
                  <div>
                    <h5 class="font-bold tracking-tight text-emerald-900">Optimal Stock Health</h5>
                    <p class="text-xs font-medium text-emerald-600/70">All inventory levels are above 15 units.</p>
                  </div>
                </div>
              </template>

              <!-- Dynamic Render of Low Items (Top 10) -->
              <template x-for="item in lowStockItems">
                <div class="flex items-center justify-between p-4 bg-rose-50/30 rounded-3xl border border-rose-100 hover:border-rose-300 transition-all cursor-pointer group">
                  <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-rose-100 text-rose-600 flex items-center justify-center shadow-sm">
                      <i data-lucide="package-minus" class="w-4 h-4"></i>
                    </div>
                    <div>
                      <h5 class="font-bold text-slate-800" x-text="item.name"></h5>
                      <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tight" x-text="item.category"></p>
                    </div>
                  </div>
                  <div class="text-right">
                    <span class="px-3 py-1 bg-white text-rose-600 rounded-full text-xs font-black inline-block border border-rose-200 shadow-sm" x-text="item.numericStock + ' Left'"></span>
                  </div>
                </div>
              </template>
              
              <!-- Redirection/Limit Notification -->
              <div x-show="lowStockCount > 10" class="text-center pt-2">
                 <a href="inventory.html" class="text-[10px] font-black text-rose-400 uppercase tracking-widest hover:text-rose-600 transition-colors">
                    View <span x-text="(lowStockCount - 10)"></span> more items in Inventory &rarr;
                 </a>
              </div>
            </div>
          </div>

        </div>

      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
