<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Management | DavaoDeOro</title>
    <link href="/src/style.css" rel="stylesheet" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
      [x-cloak] { display: none !important; }
    </style>
  </head>
  <body class="antialiased text-slate-900 overflow-x-hidden" x-data="{ sidebarOpen: true }">
    
    <div class="bg-mesh"></div>

    <!-- Sidebar -->
    <aside 
      class="fixed inset-y-0 left-0 z-50 w-72 transition-all duration-500 lg:translate-x-0"
      :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
    >
      <div class="h-full m-4 bg-white/80 backdrop-blur-2xl border border-white/40 rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden">
        <div class="p-8">
          <a href="index.html" class="flex items-center gap-4 group cursor-pointer transition-transform hover:scale-105">
            <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-xl shadow-teal-500/10 border border-teal-50 overflow-hidden transition-transform group-hover:scale-110">
              <img src="/src/img/logo.png" alt="Logo" class="w-full h-full object-cover">
            </div>
            <div>
              <h1 class="text-xl font-extrabold tracking-tight text-slate-800 leading-none">DavaoDeOro</h1>
              <span class="text-[10px] font-bold uppercase tracking-widest text-teal-600 mt-1 block">Pharmacy</span>
            </div>
          </a>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 px-4 py-2 space-y-2 overflow-y-auto">
          <p class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-4">Main Menu</p>
          
          <a href="index.html" class="nav-link w-full">
            <i data-lucide="layout-grid" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Dashboard</span>
          </a>

          <a href="inventory.html" class="nav-link w-full active">
            <i data-lucide="package" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Inventory</span>
          </a>

          <a href="POST_terminal.html" class="nav-link w-full">
            <i data-lucide="shopping-bag" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">POS Terminal</span>
          </a>

          <a href="sales.html" class="nav-link w-full">
            <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Sales History</span>
          </a>

          <a href="#" class="nav-link w-full">
            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Restocking</span>
          </a>

          <a href="#" class="nav-link w-full">
            <i data-lucide="file-text" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Reports</span>
          </a>

          <a href="#" class="nav-link w-full">
            <i data-lucide="truck" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Logistics</span>
          </a>

          <div class="my-6 border-t border-slate-100/50 mx-4"></div>
          
          <p class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-4">Administration</p>

          <a href="#" class="nav-link w-full">
            <i data-lucide="users" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Staff Management</span>
          </a>

          <a href="#" class="nav-link w-full">
            <i data-lucide="settings-2" class="w-5 h-5"></i>
            <span class="font-semibold text-[15px]">Settings</span>
          </a>
        </nav>

        <!-- Logout -->
        <div class="p-6 mt-auto">
          <button class="w-full flex items-center gap-3 px-5 py-4 text-rose-500 hover:bg-rose-50 rounded-4xl transition-all duration-300 font-bold text-sm group">
            <i data-lucide="log-out" class="w-5 h-5 transition-transform group-hover:-translate-x-1"></i>
            <span>Logout Account</span>
          </button>
        </div>
      </div>
    </aside>

    <!-- Content -->
    <main class="lg:ml-72 min-h-screen transition-all duration-500">
      
      <!-- Top Header -->
      <header class="h-24 flex items-center justify-between px-10 sticky top-0 z-40 bg-white/40 backdrop-blur-md border-b border-white/20">
        <div class="flex items-center gap-6">
          <button @click="sidebarOpen = !sidebarOpen" class="w-12 h-12 flex items-center justify-center bg-white rounded-2xl shadow-sm border border-slate-100 lg:hidden">
            <i data-lucide="menu" class="w-6 h-6"></i>
          </button>
          <div>
            <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">Stock Management</h2>
            <p class="text-sm text-slate-400 font-medium">Manage your pharmacy inventory</p>
          </div>
        </div>

        <div class="flex items-center gap-4">
          <button class="px-6 py-3 bg-indigo-600 text-white font-bold rounded-2xl flex items-center gap-2 shadow-lg shadow-indigo-500/20 hover:bg-indigo-700 transition-all">
            <i data-lucide="plus" class="w-4 h-4 text-white"></i>
            <span>Add Medicine</span>
          </button>
        </div>
      </header>

      <!-- Inventory Content -->
      <div class="p-10 space-y-8">
        
        <!-- Search & Filter Area -->
        <div class="bg-white/50 backdrop-blur-xl border border-white/40 p-2 rounded-[2.5rem] flex flex-col md:flex-row gap-4 items-center animate-bento">
          <div class="relative flex-1 w-full p-2">
            <i data-lucide="search" class="absolute left-10 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
            <input type="text" placeholder="Search medicines..." class="w-full pl-16 pr-8 py-5 bg-white border border-slate-100 rounded-4xl focus:outline-none focus:ring-4 focus:ring-indigo-500/5 focus:border-indigo-500 transition-all text-sm shadow-sm font-medium">
          </div>
          <div class="p-2 w-full md:w-auto">
            <button class="h-16 px-8 flex items-center gap-4 bg-white border border-slate-100 rounded-4xl hover:bg-slate-50 transition-all shadow-sm group">
              <i data-lucide="filter" class="w-5 h-5 text-slate-400 group-hover:text-indigo-600 transition-colors"></i>
              <span class="text-sm font-bold text-slate-600">All Categories</span>
              <i data-lucide="chevron-down" class="w-4 h-4 text-slate-300"></i>
            </button>
          </div>
        </div>

        <!-- Table View -->
        <div class="glass-card rounded-[2.5rem] overflow-hidden animate-bento delay-2">
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="bg-slate-50/50">
                  <th class="px-8 py-6 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">Medicine</th>
                  <th class="px-8 py-6 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest text-center">Category</th>
                  <th class="px-8 py-6 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest text-center">Batch</th>
                  <th class="px-8 py-6 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest text-center">Stock</th>
                  <th class="px-8 py-6 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest text-center">Price</th>
                  <th class="px-8 py-6 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">Expiry</th>
                  <th class="px-8 py-6 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest text-right">Actions</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-100/50" x-data="{
                medicines: [
                  { name: 'Paracetamol', category: 'Pain Relief', batch: 'N/A', stock: '37 units', price: 'GHC2000.00', expiryStatus: 'Good', expiryDate: '11/24/2029', color: 'bg-teal-50 text-teal-600' },
                  { name: 'Doliprane', category: 'Pain Relief', batch: 'N/A', stock: '25 units', price: 'GHC200.00', expiryStatus: 'Good', expiryDate: '10/24/2030', color: 'bg-amber-50 text-amber-600' },
                  { name: 'Aspirine', category: 'Pain Relief', batch: 'N/A', stock: '25 units', price: 'GHC150.00', expiryStatus: 'Good', expiryDate: '11/24/2029', color: 'bg-rose-50 text-rose-600' },
                  { name: 'Tramadol', category: 'Pain Relief', batch: 'N/A', stock: '30 units', price: 'GHC2000.00', expiryStatus: 'Good', expiryDate: '10/9/2031', color: 'bg-blue-50 text-blue-600' }
                ]
              }">
                <template x-for="medicine in medicines">
                  <tr class="hover:bg-slate-50/40 transition-colors group">
                    <td class="px-8 py-6">
                      <div class="flex items-center gap-4">
                        <div :class="`w-12 h-12 ${medicine.color} rounded-2xl shadow-sm border border-slate-200/50 flex items-center justify-center font-bold text-lg group-hover:scale-110 transition-transform`" x-text="medicine.name.charAt(0)">
                        </div>
                        <span class="text-[15px] font-bold text-slate-800" x-text="medicine.name"></span>
                      </div>
                    </td>
                    <td class="px-8 py-6 text-center">
                      <span class="px-4 py-1.5 bg-blue-50 text-blue-600 text-[11px] font-bold rounded-full border border-blue-100/50" x-text="medicine.category"></span>
                    </td>
                    <td class="px-8 py-6 text-center">
                      <span class="text-sm font-semibold text-slate-500" x-text="medicine.batch"></span>
                    </td>
                    <td class="px-8 py-6 text-center">
                      <span class="px-4 py-1.5 bg-emerald-50 text-emerald-600 text-[11px] font-bold rounded-full border border-emerald-100/50" x-text="medicine.stock"></span>
                    </td>
                    <td class="px-8 py-6 text-center">
                      <span class="text-[15px] font-black text-slate-800 tracking-tight" x-text="medicine.price"></span>
                    </td>
                    <td class="px-8 py-6">
                      <div class="flex flex-col">
                        <span class="text-[11px] font-bold text-emerald-600 uppercase tracking-tighter" x-text="medicine.expiryStatus"></span>
                        <span class="text-xs font-semibold text-slate-400 mt-0.5" x-text="medicine.expiryDate"></span>
                      </div>
                    </td>
                    <td class="px-8 py-6">
                      <div class="flex items-center justify-end gap-2">
                        <button class="w-10 h-10 flex items-center justify-center bg-indigo-50 text-indigo-600 rounded-xl hover:bg-indigo-600 hover:text-white transition-all shadow-sm">
                          <i data-lucide="edit-3" class="w-4 h-4"></i>
                        </button>
                        <button class="w-10 h-10 flex items-center justify-center bg-rose-50 text-rose-500 rounded-xl hover:bg-rose-500 hover:text-white transition-all shadow-sm">
                          <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                      </div>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
          
          <!-- Pagination -->
          <div class="p-8 bg-slate-50/30 border-t border-slate-100/50 flex items-center justify-between">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Showing 4 medicines in stock</p>
            <div class="flex gap-2">
              <button class="w-10 h-10 flex items-center justify-center bg-white border border-slate-100 rounded-xl text-slate-400 hover:text-indigo-600 transition-colors shadow-sm">
                <i data-lucide="chevron-left" class="w-4 h-4"></i>
              </button>
              <button class="w-10 h-10 flex items-center justify-center bg-indigo-600 text-white rounded-xl shadow-lg shadow-indigo-500/20 font-bold text-xs ring-4 ring-indigo-500/10">1</button>
              <button class="w-10 h-10 flex items-center justify-center bg-white border border-slate-100 rounded-xl text-slate-400 hover:text-indigo-600 transition-colors shadow-sm">
                <i data-lucide="chevron-right" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        </div>

      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
